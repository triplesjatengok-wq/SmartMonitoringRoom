<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KONTROL LAMPU</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Label "Terhubung" -->
  
   <h2>====================</h2>
   	     <h2>welcome</h2>
    <h1>belajar sistem</h1>
	 <h1>KENDALI LAMPU </h1>
	  <h1>IoT (Internet of Things)</h1>
	  <h2>====================</h2>
	 
  <div class="status">
    <p id="status">Terputus</p>
  </div>
    <div class="card">
      <h2>LAMPU-1</h2>
      <label class="switch">
        <input type="checkbox" id="lamp-switch" onchange="publishLampu()">
        <span class="slider" id="slider-lamp"></span>
      </label>
	</div>
    <div class="card">
	  <h2>LAMPU-2</h2>
      <label class="switch">
        <input type="checkbox" id="lamp-switch2" onchange="publishLampu2()">
        <span class="slider" id="slider-lamp2"></span>
      </label>

    </div>
	
	<!-- Tabel Status Koneksi -->
  <div class="table-container">
    <h2>Status Perangkat</h2>
    <table>
      <thead>
        <tr>
          <th>Nama Lampu</th>
          <th>Status Lampu</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Lampu1</td>
          <td><span class="disconnected" id="esp8266-01">........</span></td>
        </tr>
		<tr>
          <td>Lampu2</td>
          <td><span class="disconnected" id="esp8266-02">........</span></td>
        </tr>
       
      </tbody>
    </table>
  </div>	
   <h2><center>====================</center></h2>
     <h2><center>BELAJAR MQTT</center></h2>
</body>
 <!-- Label "KONEKSI DENGAN MQTT" -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        const clientId = Math.random().toString(16).substr(2, 8);
        const host = 'wss://broker.emqx.io:8084/mqtt';

        const options = {
          keepalive: 30,
          clientId: clientId,
          protocolId: 'MQTT',
          protocolVersion: 4,
          clean: true,
          reconnectPeriod: 1000,
          connectTimeout: 30 * 1000
        }

        console.log("Menghubungkan ke Broker");
        const client = mqtt.connect(host, options);

        client.on('connect', () => {
          console.log('Terhubung ke broker:' + clientId)
          client.subscribe('belajarmqtt/#', { qos: 1 })
          document.getElementById("status").innerHTML = "Terhubung";
        })
        client.on('message', (topic, message, packet) => {         
          if(topic === "belajarmqtt/iot"){
            const lampSwitch = document.getElementById("lamp-switch");
            var slider = document.querySelector('.slider');
            if(message.toString() === "on"){
              lampSwitch.checked = true;
              slider.classList.add("on");
            } else {
              lampSwitch.checked = false;
              slider.classList.remove("on");
            }
          }
        })
		
		 client.on('message', (topic, message, packet) => {         
          if(topic === "belajarmqtt/iot2"){
            const lampSwitch2 = document.getElementById("lamp-switch2");
            var slider = document.querySelector('.slider');
            if(message.toString() === "on2"){
              lampSwitch2.checked = true;
              slider.classList.add("on2");
            } else {
              lampSwitch2.checked = false;
              slider.classList.remove("on2");
            }
          }
        })
		
		// Status perangkat
		client.on('message', (topic, message, packet) => {   
          if(topic === "belajarmqtt/status"){
            document.getElementById("esp8266-01").innerHTML = message;
			   if(message.toString() === "Lampu-1 sukses dinyalakan"){
              document.getElementById("esp8266-01").classList.add("connected");
              document.getElementById("esp8266-01").classList.remove("disconnected");
			  
            } else {
              document.getElementById("esp8266-01").classList.add("disconnected");
              document.getElementById("esp8266-01").classList.remove("connected");
			
            }			
           
          }
		     if(topic === "belajarmqtt/status2"){
            document.getElementById("esp8266-02").innerHTML = message;
           	   if(message.toString() === "Lampu-2 sukses dinyalakan"){
              document.getElementById("esp8266-02").classList.add("connected");
              document.getElementById("esp8266-02").classList.remove("disconnected");
            } else {
              document.getElementById("esp8266-02").classList.add("disconnected");
              document.getElementById("esp8266-02").classList.remove("connected");
            }
          }
		  
          })
		
		
		

        function publishLampu(){
          var valueLampu = document.querySelector('#lamp-switch').checked;
          if(valueLampu){
            client.publish("belajarmqtt/iot", "on", {qos: 1, retain: true});
          }else{
            client.publish("belajarmqtt/iot", "off", {qos: 1, retain: true});
          }
		  
		  
		  
        }  

   function publishLampu2(){
          var valueLampu2 = document.querySelector('#lamp-switch2').checked;
          if(valueLampu2){
            client.publish("belajarmqtt/iot2", "on2", {qos: 1, retain: true});
          }else{
            client.publish("belajarmqtt/iot2", "off2", {qos: 1, retain: true});
          }
		  
		  
		  
        } 



		
    </script>
</html>
